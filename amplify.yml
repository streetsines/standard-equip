# Hosting runtime (Amplify Console → Environment variables), not only local .env:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Quote notification email (Resend — https://resend.com):
#   RESEND_API_KEY (required to send), RESEND_FROM (optional; default onboarding@resend.dev for tests)
#   QUOTE_NOTIFY_EMAIL (optional; default aaron@rentstandard.com)
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "nvm install 22"
        - "nvm use 22"
        - "node --version"
        - "npm ci"
    build:
      commands:
        - "DEPLOY_TARGET=amplify npm run build"
        - "test -f .amplify-hosting/deploy-manifest.json"
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - "node_modules/**/*"
