# Hosting runtime — set these in Amplify Console → Environment variables (branch):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (required for online quotes + confirmation page)
# Quote email (Resend — https://resend.com):
#   RESEND_API_KEY (required to email you), RESEND_FROM (optional), QUOTE_NOTIFY_EMAIL (optional)
#
# Build copies the above from the CI shell into compute/.env so Nitro SSR sees them at runtime.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "nvm install 22"
        - "nvm use 22"
        - "node --version"
        - "npm ci"
    build:
      commands:
        - "rm -f .env.production"
        - "env | grep -E '^(SUPABASE_URL|SUPABASE_SERVICE_ROLE_KEY|RESEND_API_KEY|RESEND_FROM|QUOTE_NOTIFY_EMAIL)=' >> .env.production || true"
        - "DEPLOY_TARGET=amplify npm run build"
        - "node scripts/amplify-inject-env.mjs"
        - "test -f .amplify-hosting/deploy-manifest.json"
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - "node_modules/**/*"
